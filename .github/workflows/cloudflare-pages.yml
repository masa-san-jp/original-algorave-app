name: Deploy to Cloudflare Pages

# main への push で app/ をビルドし、Cloudflare Pages に公開する。
#
# 事前準備(初回のみ):
#   1. Cloudflare アカウントを用意(無料)。
#   2. API トークンを発行: My Profile > API Tokens > Create Token
#      「Cloudflare Pages : Edit」権限を含むトークンにする。
#   3. アカウント ID を控える(ダッシュボード or Workers & Pages 画面の右側)。
#   4. Pages プロジェクトを一度作成する(どちらでも可):
#      - ダッシュボードで Workers & Pages > Create > Pages > Direct Upload、名前を
#        original-algorave-app にする、または
#      - `npx wrangler pages project create original-algorave-app --production-branch=main`
#   5. GitHub リポジトリ Settings > Secrets and variables > Actions に登録:
#      - CLOUDFLARE_API_TOKEN
#      - CLOUDFLARE_ACCOUNT_ID
#   これで main への push ごとに https://original-algorave-app.pages.dev へ自動公開される。

on:
  push:
    branches: ['main']
    # app/ かこのワークフロー自体が変わったときだけ再デプロイする
    paths:
      - 'app/**'
      - '.github/workflows/cloudflare-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      # CI と同じ検証を通してから公開する(lint/test 失敗時は壊れたビルドを公開しない)
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: app
          command: pages deploy dist --project-name=original-algorave-app --branch=main
