name: Deploy to Cloudflare Pages

# GitHub Actions 経由で app/ をビルドし Cloudflare Pages に公開する「方法2」の workflow。
#
# ● このリポジトリの既定は Cloudflare の Git 連携(ダッシュボードで GitHub を接続する方式)です。
#   push 時の自動ビルド&公開は Cloudflare 側が担当するため、この workflow は既定では
#   push で走らせず、手動実行(workflow_dispatch)専用にしています。二重デプロイと、
#   シークレット未設定時の失敗表示(ノイズ)を避けるためです。
#
# ● Actions 方式に切り替えたい場合(Git 連携をやめてコードで管理したい等):
#   1. 下の push: トリガーのコメントアウトを解除する。
#   2. API トークンを発行(My Profile > API Tokens、「Cloudflare Pages : Edit」権限)。
#   3. GitHub の Settings > Secrets and variables > Actions に登録:
#        - CLOUDFLARE_API_TOKEN
#        - CLOUDFLARE_ACCOUNT_ID
#   4. Pages プロジェクト(名前 original-algorave-app)を一度作成:
#        npx wrangler pages project create original-algorave-app --production-branch=main
#   これで main への push ごとに https://original-algorave-app.pages.dev へ自動公開される。

on:
  workflow_dispatch:
  # Git 連携をやめて Actions 方式にする場合は、この push: の各行のコメントを外す。
  # push:
  #   branches: ['main']
  #   paths:
  #     - 'app/**'
  #     - '.github/workflows/cloudflare-pages.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      # CI と同じ検証を通してから公開する(lint/test 失敗時は壊れたビルドを公開しない)
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: app
          # プロジェクト名(name)と出力先(pages_build_output_dir)は app/wrangler.toml から取得
          command: pages deploy --branch=main
