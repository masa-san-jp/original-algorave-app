name: Deploy to GitHub Pages

# main への push で app/ をビルドし、GitHub Pages に公開する。
# Pages を使う場合はリポジトリ設定 Settings > Pages > Source を "GitHub Actions" にすること。

on:
  push:
    branches: ['main']
    # app/ かデプロイ設定が変わったときだけ再デプロイする(docs/README のみの変更では走らせない)
    paths:
      - 'app/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# GITHUB_TOKEN に Pages デプロイ権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1本に制限(進行中のRunはキャンセルせず完了を待つ)
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      # CI と同じ検証を通してから公開する(lint/test 失敗時は壊れたビルドを公開しない)
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
